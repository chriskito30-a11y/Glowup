<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Console GlowUp — Modulys</title>
  <meta name="theme-color" content="#7c3aed">
  <link rel="icon" href="assets/img/module-glowup.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;650;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-mark">✨</span><span>GlowUp</span></a>
      <div class="nav-actions">
        <a class="btn btn-secondary" href="index.html">Mes sessions</a>
        <button id="logoutBtn" class="btn btn-ghost" type="button">Déconnexion</button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="container grid two">
      <article class="card">
        <p class="eyebrow">Console organisateur</p>
        <h1 id="sessionTitle">GlowUp</h1>
        <p id="sessionSubtitle" class="lead">—</p>
        <div class="stat-grid">
          <article class="stat"><strong id="participantCount">0</strong><span>participants</span></article>
          <article class="stat"><strong id="participantLimit">—</strong><span>limite</span></article>
          <article class="stat"><strong id="sessionState">—</strong><span>état</span></article>
        </div>
        <div id="placementSummary" class="placement-summary"></div>
        <div class="link-row"><input id="joinLink" readonly><button class="btn btn-secondary" id="copyBtn" type="button">Copier</button></div>
        <div class="qr-card"><img id="qrImg" alt="QR code participant GlowUp"></div>
      </article>

      <article class="card effect-card">
        <p class="eyebrow">Effets live</p>
        <h2>Lancer un effet ciblé</h2>

        <section class="target-box">
          <h3>Ciblage</h3>
          <div class="grid three target-grid">
            <div class="field">
              <label for="zoneSelect">Gauche / centre / droite</label>
              <select id="zoneSelect">
                <option value="all">Toute largeur</option>
                <option value="left">Gauche</option>
                <option value="center">Centre</option>
                <option value="right">Droite</option>
              </select>
            </div>
            <div class="field">
              <label for="depthSelect">Devant / milieu / derrière</label>
              <select id="depthSelect">
                <option value="all">Toute profondeur</option>
                <option value="front">Devant</option>
                <option value="middle">Milieu</option>
                <option value="back">Derrière</option>
              </select>
            </div>
            <div class="field">
              <label for="rowSelect">Rangée</label>
              <select id="rowSelect"><option value="all">Toutes les rangées</option></select>
            </div>
          </div>
          <p class="mini-help">Exemple : ciblez “gauche + devant + rangée 2”, ou seulement “rangée 5”.</p>
        </section>

        <div class="color-grid">
          <button class="color-btn" style="--c:#ffffff" data-color="#ffffff">Blanc</button>
          <button class="color-btn" style="--c:#ff2d55" data-color="#ff2d55">Rose</button>
          <button class="color-btn" style="--c:#7c3aed;color:white" data-color="#7c3aed">Violet</button>
          <button class="color-btn" style="--c:#22d3ee" data-color="#22d3ee">Bleu</button>
          <button class="color-btn" style="--c:#22c55e" data-color="#22c55e">Vert</button>
          <button class="color-btn" style="--c:#facc15" data-color="#facc15">Jaune</button>
        </div>
        <div class="controls">
          <button class="btn btn-primary" data-effect="pulse" type="button">Pulse doux</button>
          <button class="btn btn-secondary" data-effect="wave" type="button">Vague lumineuse</button>
          <button class="btn btn-secondary" data-effect="countdown" type="button">Compte à rebours 3 secondes</button>
          <button class="btn btn-ghost" data-effect="idle" type="button">Stop / repos</button>
        </div>

        <section class="target-box">
          <h3>Effet complet automatique</h3>
          <div class="field">
            <label for="sequenceMode">Séquence</label>
            <select id="sequenceMode">
              <option value="left-center-right">Gauche → Centre → Droite</option>
              <option value="right-center-left">Droite → Centre → Gauche</option>
              <option value="front-middle-back">Devant → Milieu → Derrière</option>
              <option value="back-middle-front">Derrière → Milieu → Devant</option>
              <option value="rows-forward">Rangées 1 → dernière</option>
              <option value="rows-backward">Dernière → rangée 1</option>
            </select>
          </div>
          <div class="field compact-field">
            <label for="sequenceDelay">Temps entre chaque étape</label>
            <input id="sequenceDelay" type="number" min="250" max="3000" step="250" value="700">
          </div>
          <button class="btn btn-primary" id="sequenceBtn" type="button">Lancer la séquence</button>
        </section>

        <p id="status" class="status"></p>
        <button id="closeBtn" class="btn btn-secondary" type="button">Fermer la session</button>
      </article>
    </section>
  </main>
  <script type="module" src="assets/js/session.js"></script>
</body>
</html>
